<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>She Can Foundation</title>

  <link rel="stylesheet" href="CSS.code.css">

</head>

<body>

  <header>

    <h1>She Can Foundation</h1>

    <p>
      Empowering Students Through Learning & Opportunities
    </p>

    <!-- Dark Mode Button -->

    <button class="dark-btn"
    onclick="toggleDarkMode()">

      Dark Mode

    </button>

  </header>

  <div class="container">

    <div class="content">

      <!-- About Section -->

      <div class="text">

        <h2>Welcome to Our NGO</h2>

        <p>
          She Can Foundation helps students gain knowledge,
          improve skills, and build better career opportunities
          through education, internships, and guidance.
        </p>

      </div>

      <!-- Image -->

      <div class="image">

        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f"
        alt="Students Learning">

      </div>

    </div>

    <!-- Form -->

    <form onsubmit="submitForm(event)">

      <input type="text"
      placeholder="Enter Your Name"
      required>

      <input type="email"
      placeholder="Enter Your Email"
      required>

      <textarea rows="5"
      placeholder="Enter Your Message"
      required></textarea>

      <!-- Submit Button -->

      <button type="submit">

        Submit

      </button>

    </form>

    <p id="message"></p>

  </div>

  <!-- Footer -->

  <footer>

    © 2026 She Can Foundation | All Rights Reserved

  </footer>

  <script src="JavaScript.code.js"></script>

</body>

</html>
